---
- name: Ensure Ghostty is installed
  homebrew_cask:
    name: ghostty
    state: latest

- name: Ensure Ghostty config directory exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/ghostty"
    state: directory
    mode: "0755"

- name: Symlink Ghostty config from role files
  file:
    src: "{{ role_path }}/files/config"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/ghostty/config"
    state: link
    force: true
